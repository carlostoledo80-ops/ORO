name: oro-diario

on:
  schedule:
    - cron: "20 13 * * 1-5"
  workflow_dispatch:
    inputs:
      modo:
        description: "diario o validar"
        default: "diario"

jobs:
  oro:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install yfinance pandas numpy scipy requests

      - name: Ejecutar sistema ORO
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          ORO=$(find . -name oro.py -not -path "./.git/*" | head -1)
          if [ -z "$ORO" ]; then echo "ERROR: no aparece oro.py"; ls -R .; exit 1; fi
          echo "Ejecutando $ORO en modo: ${{ github.event.inputs.modo }}"
          python "$ORO" ${{ github.event.inputs.modo }}
